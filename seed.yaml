    consumers: [ORGAN-IV, META-ORGANVM]
  - type: registry
    description: "Programmatic registry access, queries, and updates"
    consumers: [ORGAN-IV, META-ORGANVM]
  - type: metrics
    description: "System metrics calculation, propagation, timeseries, variable resolution"
    consumers: [META-ORGANVM]
  - type: omega-scorecard
    description: "17-criterion binary maturity scorecard for the entire system"
    consumers: [META-ORGANVM]
  - type: context-files
    description: "Auto-generated CLAUDE.md/GEMINI.md/AGENTS.md across all repos"
    consumers: [ORGAN-I, ORGAN-II, ORGAN-III, ORGAN-IV, ORGAN-V, ORGAN-VI, ORGAN-VII, META-ORGANVM]
  - type: session-analysis
    description: "Multi-agent session transcript parsing, plan auditing, prompt analysis"
    consumers: [META-ORGANVM]
  - type: plan-atoms
    description: "Atomized tasks from plan .md files with tags, file refs, status, project metadata"
    consumers: [META-ORGANVM]
  - type: prompt-narratives
    description: "Extracted and classified user prompts threaded into narrative episodes"
    consumers: [META-ORGANVM]
  - type: atom-links
    description: "Jaccard-matched task-to-prompt links and git-reconciled completion verdicts"
    consumers: [META-ORGANVM]
  - type: testament-artifacts
    description: "Hash-chained event ledger, genesis blocks, checkpoint verification"
    consumers: [META-ORGANVM]
  - type: ci-reports
    description: "CI health triage reports from soak-test data"
    consumers: [META-ORGANVM]
  - type: pitch-decks
    description: "HTML pitch deck generation per repo"
    consumers: [META-ORGANVM]
  - type: ecosystem-profiles
    description: "Product business profiles, competitive matrix, gap analysis, action items"
    consumers: [META-ORGANVM]
  - type: fossil-record
    description: "Archaeological reconstruction — hash-linked commit records classified by Jungian archetype, epoch chronicles, intention capture, drift analysis"
    consumers: [META-ORGANVM]
  - type: witness-hooks
    description: "Git post-commit hooks for real-time WITNESSED provenance recording across all workspace repos"
    consumers: [ALL]

