schema_version: "1.0"
organ: Meta
organ_name: Meta
repo: organvm-engine
org: meta-organvm

metadata:
  implementation_status: ACTIVE
  tier: flagship
  promotion_status: GRADUATED
  last_validated: "2026-03-21"
  generated: "2026-02-17"
  sprint: "INFRASTRUCTURE"
  language: python
  note: >-
    Core Python package: 30+ domain modules, 4 foundation modules,
    34 CLI command groups. Registry, governance, seed discovery,
    metrics, dispatch, git superproject management, context file sync,
    omega scorecard, CI triage, session analysis, plan atomization,
    prompt narrative extraction, atom linking, ecosystem profiling,
    SOP resolver, IRF parser, event spine, testament protocol,
    ontologia integration, pulse system, trivium dialect translation,
    network testament, content syndication, debt tracking, and the
    unified 'organvm' CLI.

agents:
  - name: ci
    trigger: on_push
    workflow: .github/workflows/ci.yml
    description: "Run tests and type checks"

produces:
