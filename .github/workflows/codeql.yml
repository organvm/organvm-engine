name: CodeQL

# Content-based detection: code-path-scoped triggers mean the analysis only
# runs when actual source content changes (plus a weekly baseline scan). The
# Descent Protocol audit (organvm ci audit) detects this workflow both by
# filename and by the github/codeql-action references below.

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - ".github/workflows/codeql.yml"
  schedule:
    # Weekly full scan — Mondays 04:27 UTC (independent of content changes).
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF results to the Security tab
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
