name: Ecosystem Sync Check
on:
  push:
    branches: [main]
    paths:
      - 'src/organvm_engine/ecosystem/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install "organvm-ontologia @ git+https://github.com/meta-organvm/organvm-ontologia.git"
          pip install -e .
      - name: Check for unsynced repos
        run: organvm ecosystem sync --dry-run
