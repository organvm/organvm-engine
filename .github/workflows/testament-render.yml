name: Testament Auto-Render

on:
  push:
    branches: [main]
    paths:
      - 'src/organvm_engine/testament/**'
      - 'src/organvm_engine/registry/**'
      - 'src/organvm_engine/metrics/**'
      - 'src/organvm_engine/omega/**'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install engine
        run: |
          pip install "organvm-ontologia @ git+https://github.com/meta-organvm/organvm-ontologia.git"
          pip install -e .

      - name: Render testament artifacts
        run: |
          mkdir -p testament-output
          # Some renderers need the full workspace (corpus repo); partial success
          # is expected in CI where only the engine repo is checked out.
          organvm testament render --write --output-dir testament-output || true
          organvm testament cascade --write --json > testament-output/cascade-manifest.json || true
          COUNT=$(ls testament-output/*.svg 2>/dev/null | wc -l)
          echo "Rendered $COUNT SVGs"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No testament artifacts produced"
            exit 1
          fi

      - name: Upload testament artifacts
        uses: actions/upload-artifact@v7
        with:
          name: testament-artifacts-${{ github.sha }}
          path: testament-output/
          retention-days: 90
